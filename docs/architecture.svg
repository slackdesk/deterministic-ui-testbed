<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">

<style>
.box {
  fill:#f5f7fa;
  stroke:#3b82f6;
  stroke-width:2;
  rx:12;
  ry:12;
}

.text {
  font-family:Arial, Helvetica, sans-serif;
  font-size:18px;
  fill:#111827;
  text-anchor:middle;
  dominant-baseline:middle;
}

.arrow {
  stroke:#6b7280;
  stroke-width:2;
  marker-end:url(#arrowhead);
}
</style>

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"></polygon>
</marker>
</defs>

<!-- Boxes -->

<rect class="box" x="40" y="140" width="150" height="70"></rect>
<text class="text" x="115" y="175">Prompt</text>

<rect class="box" x="230" y="140" width="180" height="70"></rect>
<text class="text" x="320" y="175">AI Agent</text>

<rect class="box" x="460" y="140" width="200" height="70"></rect>
<text class="text" x="560" y="175">Playwright Tests</text>

<rect class="box" x="700" y="140" width="170" height="70"></rect>
<text class="text" x="785" y="175">Browser</text>

<!-- Result box -->

<rect class="box" x="350" y="260" width="200" height="70"></rect>
<text class="text" x="450" y="295">JSON QA Signal</text>

<!-- Arrows -->

<line class="arrow" x1="190" y1="175" x2="230" y2="175"></line>
<line class="arrow" x1="410" y1="175" x2="460" y2="175"></line>
<line class="arrow" x1="660" y1="175" x2="700" y2="175"></line>

<line class="arrow" x1="785" y1="210" x2="450" y2="260"></line>

</svg>